name: Devel Rolling Build

on:
  schedule:
    - cron: '0 2 * * 1,3,6'
  workflow_dispatch:

jobs:
  build-devel:
    strategy:
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    container: { image: "fedora:latest", options: "--privileged" }
    steps:
      - name: Install Dependencies
        run: dnf install -y flatpak flatpak-builder git rsync gpg
      - uses: actions/checkout@v4
      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "GPG_KEY_ID=$(gpg --list-keys --with-colons | grep '^pub' | head -n 1 | cut -d: -f5)" >> $GITHUB_ENV
      - name: Add Flathub
        run: |
          for i in {1..5}; do
            flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo && break || \
            echo "Retry $i: Failed to connect to Flathub, retrying in 5s..." && sleep 5;
          done
      - name: Build Devel
        run: |
          BUILD_ID=$(date +%Y%m%d)
          BRANCH_NAME="main"
          sed -i "s/__BUILD__/${BUILD_ID}/g" graphics.friction.Friction.json
          sed -i "s/__BRANCH__/${BRANCH_NAME}/g" graphics.friction.Friction.json
          flatpak-builder --user --arch=${{ matrix.arch }} --install-deps-from=flathub --force-clean build-dir graphics.friction.Friction.json --default-branch=devel
          flatpak build-export --gpg-sign=${{ env.GPG_KEY_ID }} repo build-dir devel
      - name: Cleanup
        if: always()
        run: rm -rf /github/home/.gnupg
      - name: Upload Devel Repo
        uses: actions/upload-artifact@v4
        with:
          name: repo-devel-${{ matrix.arch }}
          path: repo/

  deploy:
    needs: build-devel
    runs-on: ubuntu-latest
    container: { image: "fedora:latest", options: "--privileged" }
    permissions:
      contents: write
    steps:
      - name: Install Dependencies
        run: dnf install -y flatpak git rsync gpg
      - uses: actions/checkout@v4
      
      - name: Get Public Repository
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: old-repo

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "GPG_KEY_ID=$(gpg --list-keys --with-colons | grep '^pub' | head -n 1 | cut -d: -f5)" >> $GITHUB_ENV
      
      - name: Download Devel Artifacts
        uses: actions/download-artifact@v4
        with:
          path: fetched-repos

      - name: Merge and Finalize
        run: |
          mkdir -p final-repo

          if [ -d "old-repo" ]; then
            rsync -av --exclude='.git' old-repo/ final-repo/
          fi

          for dir in fetched-repos/repo-devel-*; do
            if [ -d "$dir" ]; then
              rsync -av "$dir/" final-repo/
            fi
          done

          flatpak build-update-repo --gpg-sign=${{ env.GPG_KEY_ID }} final-repo

          cp *.flatpakref *.flatpakrepo final-repo/
          cp index.md final-repo/
          cp _config.yml final-repo/
          cp CNAME final-repo/
      - name: Cleanup
        if: always()
        run: rm -rf /github/home/.gnupg
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: final-repo
          branch: gh-pages
          clean: true
